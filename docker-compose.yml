version: '3.8'

services:
  backend:
    build: ./backend
    container_name: viaticos-backend
    restart: always
    ports:
      - "3026:5000"
    environment:
      - PORT=5000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JASPER_SERVER_URL=${JASPER_SERVER_URL}
      - JASPER_USERNAME=${JASPER_USERNAME}
      - JASPER_PASSWORD=${JASPER_PASSWORD}
    networks:
      - viaticos-net

  frontend:
    build: ./frontend
    container_name: viaticos-frontend
    restart: always
    ports:
      - "3027:80"
    depends_on:
      - backend
    networks:
      - viaticos-net

networks:
  viaticos-net:
    driver: bridge
